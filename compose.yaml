# 3-node rustkv cluster. Client APIs on localhost:8081-8083.
#
# Two networks so partitions cut ONLY node-to-node traffic:
# - `client`: carries the published ports (host access keeps working);
# - `raft`: peer traffic, addressed via the *-raft aliases, which exist
#   only on this network — so raft RPCs cannot fall back to `client`.
#
# Peer client URLs are the HOST-visible addresses (localhost:808x) because
# write redirects are followed by the host-side client, not by containers.
#
# Partition a node (raft-only, client API stays reachable):
#   docker network disconnect rustkv-raft rustkv-node1
# Heal it:
#   docker network connect --alias node1-raft rustkv-raft rustkv-node1
name: rustkv

x-node: &node
  build: .
  restart: unless-stopped

services:
  node1:
    <<: *node
    container_name: rustkv-node1
    environment:
      RUSTKV_NODE_ID: "1"
      RUSTKV_PEERS: "2=node2-raft:9080,3=node3-raft:9080"
      RUSTKV_PEER_CLIENT_URLS: "2=http://localhost:8082,3=http://localhost:8083"
    ports: ["8081:8080"]
    volumes: ["node1-data:/data"]
    networks:
      client: {}
      raft:
        aliases: [node1-raft]

  node2:
    <<: *node
    container_name: rustkv-node2
    environment:
      RUSTKV_NODE_ID: "2"
      RUSTKV_PEERS: "1=node1-raft:9080,3=node3-raft:9080"
      RUSTKV_PEER_CLIENT_URLS: "1=http://localhost:8081,3=http://localhost:8083"
    ports: ["8082:8080"]
    volumes: ["node2-data:/data"]
    networks:
      client: {}
      raft:
        aliases: [node2-raft]

  node3:
    <<: *node
    container_name: rustkv-node3
    environment:
      RUSTKV_NODE_ID: "3"
      RUSTKV_PEERS: "1=node1-raft:9080,2=node2-raft:9080"
      RUSTKV_PEER_CLIENT_URLS: "1=http://localhost:8081,2=http://localhost:8082"
    ports: ["8083:8080"]
    volumes: ["node3-data:/data"]
    networks:
      client: {}
      raft:
        aliases: [node3-raft]

networks:
  client:
    name: rustkv-client
  raft:
    name: rustkv-raft

volumes:
  node1-data:
  node2-data:
  node3-data:
